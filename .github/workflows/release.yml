name: Create GitHub Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release from tag annotation
        env:
          GH_TOKEN: ${{ secrets.PREMIERE_CLI_PAT }}
        run: |
          gh release create "${{ github.ref_name }}" \
            -F "RELEASE.md"
